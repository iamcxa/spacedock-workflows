name: ship-flow invariants

on:
  push:
    branches: [main]
    paths:
      - 'plugins/ship-flow/**'
      - 'docs/ship-flow/**'
      - '.github/workflows/ship-flow-invariants.yml'
      - '.github/workflows/ship-flow-doc-impact.yml'
      - '.claude-plugin/marketplace.json'
      - 'README.md'
      - 'scripts/**'
  pull_request:
    paths:
      - 'plugins/ship-flow/**'
      - 'docs/ship-flow/**'
      - '.github/workflows/ship-flow-invariants.yml'
      - '.github/workflows/ship-flow-doc-impact.yml'
      - '.claude-plugin/marketplace.json'
      - 'README.md'
      - 'scripts/**'

permissions:
  contents: read

jobs:
  invariants:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: scope needs the PR merge base or push-event before
          # SHA, neither of which is reliably available at checkout depth 1.
          fetch-depth: 0

      - name: Detect changed-file scope
        id: ship_flow_scope
        run: |
          BASE="${{ github.event.pull_request.base.sha || github.event.before }}"
          EVENT_NAME="${{ github.event_name }}"
          # Branch-creation push events set `before` to the all-zeros SHA.
          # Conservatively scan every tracked file: a last-commit-only diff
          # would miss plugin changes earlier in a multi-commit initial push.
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git ls-files)
          elif ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            echo "ERROR: event base commit is unavailable: $BASE" >&2
            exit 1
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            # PR scope is the topic branch relative to its merge base. This
            # excludes base-only changes added after the branch diverged.
            CHANGED=$(git diff --no-renames --name-only "$BASE"...HEAD)
          else
            # Push scope is the exact before/after tree delta. Three-dot would
            # lose old-side removals on a non-fast-forward push.
            CHANGED=$(git diff --no-renames --name-only "$BASE" HEAD)
          fi
          echo "Changed files:"
          echo "$CHANGED"
          printf '%s\n' "$CHANGED" > /tmp/ship_flow_changed_files.txt

          PLUGIN_CHANGED=false
          DOCS_ONLY=true
          FULL_SUITE=false
          SOURCE_REPO=false

          if [ -d plugins/ship-flow ]; then
            SOURCE_REPO=true
          fi

          while IFS= read -r f; do
            if [[ "$f" == plugins/ship-flow/* ]]; then
              PLUGIN_CHANGED=true
              DOCS_ONLY=false
            elif [[ "$f" != *.md && "$f" != docs/* ]]; then
              DOCS_ONLY=false
            fi
          done <<< "$CHANGED"

          if [ "$PLUGIN_CHANGED" = "true" ]; then
            FULL_SUITE=true
          fi

          if [ "$DOCS_ONLY" = "true" ]; then
            FULL_SUITE=false
            echo "docs_only_lightweight=true" >> "$GITHUB_OUTPUT"
            echo "full_suite=false" >> "$GITHUB_OUTPUT"
          else
            echo "docs_only_lightweight=false" >> "$GITHUB_OUTPUT"
            echo "full_suite=$FULL_SUITE" >> "$GITHUB_OUTPUT"
          fi
          echo "plugin_changed=$PLUGIN_CHANGED" >> "$GITHUB_OUTPUT"
          echo "source_repo=$SOURCE_REPO" >> "$GITHUB_OUTPUT"

      - name: Lightweight gate (docs-only / non-plugin changes)
        if: steps.ship_flow_scope.outputs.source_repo == 'true' && steps.ship_flow_scope.outputs.full_suite == 'false'
        run: |
          echo "Docs-only or non-plugin change — running lightweight gate only"
          CI=true bash plugins/ship-flow/bin/check-invariants.sh

      - name: Run full ship-flow shell test suite
        if: steps.ship_flow_scope.outputs.full_suite == 'true'
        timeout-minutes: 10
        run: |
          # MUST run from repo root (NOT cd plugins/ship-flow): several tests
          # resolve plugins/ship-flow/... repo-root-relative (e.g. registry-resolve
          # check_m2_knowledge); running from the plugin dir path-doubles → false fail.
          # Matches bump-version.sh which does `cd repo_root`.
          echo "Running full standalone test suite (from repo root)..."
          FAILED=0
          for t in plugins/ship-flow/lib/__tests__/test-*.sh; do
            echo "  == $(basename "$t") =="
            # CI=true must precede timeout (env assignment), not be timeout's command.
            # warn-state-drift is the slowest (~7-25s); allow up to 90s per test.
            if ! CI=true timeout 90 bash "$t"; then
              echo "  FAILED: $t"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "ERROR: $FAILED test(s) failed"
            exit 1
          fi
          echo "All tests passed"

      - name: Run bin node tests
        if: steps.ship_flow_scope.outputs.full_suite == 'true'
        run: |
          node --test plugins/ship-flow/bin/*.test.mjs

      - name: Check version triple consistency
        if: steps.ship_flow_scope.outputs.source_repo == 'true'
        run: bash scripts/check-version-triple.sh

      - name: Check no dangling references
        if: steps.ship_flow_scope.outputs.source_repo == 'true'
        run: bash scripts/check-no-dangling.sh
