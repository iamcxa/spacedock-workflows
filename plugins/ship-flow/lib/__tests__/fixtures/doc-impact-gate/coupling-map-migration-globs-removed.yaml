schema_version: "1.1"
couplings:
  - name: ledger.contract
    srcGlobs: ["src/ledger/*.json"]
    docPaths: ["docs/ledger.md"]
    directions: ["source-to-doc", "doc-to-source"]
    exemptGlobs: ["src/ledger/generated/**"]
    rationale: "Source, doc, and exemption coverage narrowed."
  - name: stable-row
    srcGlobs: ["src/stable/**"]
    docPaths: ["docs/stable.md"]
    rationale: "Keeps head maps non-empty."
