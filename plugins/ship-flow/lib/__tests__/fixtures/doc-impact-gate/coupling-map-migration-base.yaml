schema_version: "1.1"
couplings:
  - name: ledger.contract
    srcGlobs: ["src/ledger/*.json", "src/ledger/*.ts"]
    docPaths: ["docs/ledger.md", "docs/ledger-consumers.md"]
    directions: ["source-to-doc", "doc-to-source"]
    exemptGlobs: ["src/ledger/generated/**", "src/ledger/legacy/**"]
    rationale: "Base contract for weakening detection."
  - name: stable-row
    srcGlobs: ["src/stable/**"]
    docPaths: ["docs/stable.md"]
    rationale: "Keeps head maps non-empty."
