# Flow Map Schema — canonical contract for map-layer docs
# Consumers: patch-map.sh, extract-map.sh
#
# Schema validates: section_tag presence + requires_diagram for C4 sections
# Extract via: bash plugins/ship-flow/lib/extract-map.sh {map-file} {section-tag}

schema_version: "1.0"

# MADR convention for entity architecture-impact section (consumed by #060 mod)
madr_convention:
  title: "entity.title (frontmatter)"
  status: "entity.status (frontmatter)"
  context: "architecture-impact.summary (prose, 1-3 sentences)"
  decision: "architecture-impact.after (new section content)"
  consequences: "architecture-impact.rationale (optional)"

maps:
  ARCHITECTURE.md:
    path: "ARCHITECTURE.md"
    sections:
      - section_tag: context
        title: "Context"
        purpose: "System boundary and external actors (C4 Level 1)"
        requires_diagram: true
        diagram_type: mermaid
        diagram_kind: "C4 System Context"
      - section_tag: containers
        title: "Containers"
        purpose: "Deployment units and transports (C4 Level 2)"
        requires_diagram: true
        diagram_type: mermaid
        diagram_kind: "C4 Container"
      - section_tag: components
        title: "Components"
        purpose: "Internal logical modules (C4 Level 3)"
        requires_diagram: true
        diagram_type: mermaid
        diagram_kind: "C4 Component or layering"
      - section_tag: constraints
        title: "Constraints"
        purpose: "Hard limits and non-negotiables"
        requires_diagram: false
      - section_tag: dependencies
        title: "Dependencies"
        purpose: "External dependencies and blast radius"
        requires_diagram: false
      - section_tag: decisions
        title: "Decisions (ADR index)"
        purpose: "ADR index — each row links to an entity that declared an architecture change via architecture-impact block"
        requires_diagram: false

  PRODUCT.md:
    path: "PRODUCT.md"
    sections:
      - section_tag: capabilities
        title: "Current Capabilities"
        purpose: "User-facing capabilities by domain; appended on ship"
        requires_diagram: false

  ROADMAP.md:
    path: "ROADMAP.md"
    sections:
      - section_tag: now
        title: "Now (committed, actively working)"
        purpose: "Active build cycle — entities currently in execute or later stages"
        requires_diagram: false
      - section_tag: next
        title: "Next (shaped, ready to start when Now clears)"
        purpose: "Shaped pitches ready to start when Now clears"
        requires_diagram: false
      - section_tag: later
        title: "Later (ideas with potential, not yet shaped)"
        purpose: "Raw ideas / rabbit holes / todos backlog"
        requires_diagram: false
      - section_tag: not-doing
        title: "Not Doing (explicitly rejected with reason)"
        purpose: "Explicit deletes with reason (Musk step 2)"
        requires_diagram: false
      - section_tag: shipped
        title: "Shipped"
        purpose: "History of shipped entities"
        requires_diagram: false
  plugins/spacebridge/design/design-system.md:
    path: "plugins/spacebridge/design/design-system.md"
    sections:
      - section_tag: foundations
        title: "Foundations"
        purpose: "Color, typography, spacing, borders, shadows, motion tokens (§1-6)"
        requires_diagram: false
      - section_tag: components
        title: "Components"
        purpose: "Component specimens (each with HTML + design rationale)"
        requires_diagram: false
      - section_tag: patterns
        title: "Composition Principles & Patterns"
        purpose: "How components compose into screens (§7)"
        requires_diagram: false
