name: ship-flow contribution contract

on:
  pull_request:

permissions:
  contents: read

jobs:
  doc_impact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run adopted contribution contract
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          PR_BASE_SHA="${{ github.event.pull_request.base.sha }}"
          if ! git cat-file -e "${PR_BASE_SHA}^{commit}" 2>/dev/null; then
            echo "ERROR: pull-request base commit is unavailable: $PR_BASE_SHA" >&2
            exit 1
          fi
          MERGE_BASE="$(git merge-base "$PR_BASE_SHA" HEAD)" || {
            echo "ERROR: cannot resolve merge base for $PR_BASE_SHA and HEAD." >&2
            exit 1
          }
          [ -n "$MERGE_BASE" ] || { echo "ERROR: resolved merge base is empty." >&2; exit 1; }

          MAP=.claude/ship-flow/doc-coupling.yaml
          CHECKER=.claude/ship-flow/doc-impact-gate.sh
          BASE_MAP=/tmp/ship_flow_base_doc_coupling.yaml
          CHANGED=/tmp/ship_flow_doc_impact_changed_files.txt
          CHANGED_STATUS=/tmp/ship_flow_doc_impact_changed_status.txt
          ARGS=()
          git diff --no-renames --name-only "$MERGE_BASE"...HEAD > "$CHANGED"
          git diff --no-renames --name-status "$MERGE_BASE"...HEAD > "$CHANGED_STATUS"

          if git cat-file -e "${MERGE_BASE}:${MAP}" 2>/dev/null; then
            git show "${MERGE_BASE}:${MAP}" > "$BASE_MAP"
            ARGS+=("--base-coupling-map=$BASE_MAP")
          fi
          if [ -f "$MAP" ]; then
            ARGS+=("--coupling-map=$MAP")
          elif [ -s "$BASE_MAP" ]; then
            ARGS+=("--head-map-absent")
          else
            echo "ERROR: adopter contribution map is absent at both base and HEAD: $MAP" >&2
            exit 1
          fi
          if [ ! -f "$CHECKER" ]; then
            echo "ERROR: adopted checker is absent at HEAD: $CHECKER" >&2
            exit 1
          fi

          bash "$CHECKER" \
            "--changed=$CHANGED" \
            "--changed-status=$CHANGED_STATUS" \
            "--declaration=$PR_BODY" \
            "${ARGS[@]}"
