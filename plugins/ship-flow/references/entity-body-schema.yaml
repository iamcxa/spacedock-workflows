# Entity Body Schema
# Canonical definition of what each stage reads and writes in the entity markdown file.
# All skills and FO reference this file. Dashboard parses entities using this schema.
#
# Convention:
#   - Each stage writes up to 3 standard blocks: Output, Report, UAT
#   - Section headers use: ## {Stage} {Block}  (e.g., ## Sharp Output, ## Plan Report)
#   - Report block always contains: status, stage_cost (grepable by FO)
#   - UAT block uses the Verification Spec table format (typed DC)
#   - Sections are append-only within a stage; later stages never modify earlier sections
#
# Section Tags (v1.2):
#   - Each section/subsection has section_tag: and layer: fields
#   - section_tag: used for HTML comment wrapping: <!-- section:{tag} --> ... <!-- /section:{tag} -->
#   - layer: decision | implementation — enables layer-based filtering across entities
#   - Tags are invisible in rendered markdown (GitHub, Claude Design, dashboard)
#   - Extract via: bash plugins/ship-flow/lib/extract-section.sh {entity-file} {section-tag}
# Section Tags (v1.2): + answers_density (Principle 4 boolean-gate); lazy-classified at first ship-* invocation

schema_version: "1.3"
# v1.3 (2026-04-29): + pre_mortem block (PR #43); design_constraints[] + render_fidelity_targets[] structured object schema (G9/G12); hand_off_to_plan.design-skipped marker (G14); removed plan_constraints subsection (G8 dedup, source-of-truth = hand_off_to_plan).

# --- Frontmatter (YAML in entity file header) ---
frontmatter:
  required:
    id: { type: string, example: '"017"', description: "Sequential zero-padded, unique within workflow" }
    title: { type: string, example: '"DAG + Kanban view components"' }
    status: { type: enum, values: [draft, sharp, design, plan, execute, verify, ship, done], description: "Current pipeline stage" }
  optional:
    source: { type: string, description: "Where idea came from" }
    started: { type: iso8601, description: "When active work began" }
    completed: { type: iso8601, description: "When terminal status reached" }
    verdict: { type: enum, values: [PASSED, REJECTED] }
    priority: { type: enum, values: [P0, P1, P2, P3], description: "Captain priority. P0=drop everything, P1=this sprint (Now), P2=next sprint (Next), P3=backlog (Later)" }
    score: { type: number, range: "0.0-1.0", description: "Sharp scoring gate objective score (problem clarity × feasibility × roadmap fit). Different from priority — score is computed, priority is captain intent." }
    worktree: { type: string, description: "Worktree path while active" }
    parent: { type: string, example: '"003"', description: "Epic/parent entity ID" }
    depends-on: { type: list, items: string, example: '["004", "005"]', description: "DAG dependency edges" }
    tracker: { type: enum, values: [gh, linear], default: gh }
    issue: { type: string, example: '"#42"' }
    external_id: { type: string, example: '"PROJ-123"' }
    pr: { type: string }
    token_budget: { type: number, unit: USD }
    token_actual: { type: number, unit: USD, description: "Accumulated by FO across stages" }
    pr_feedback_round: { type: number, default: 0 }
    affects_ui:
      type: bool
      optional: true
      set_at: shape
      default: false
      description: |
        True when shape detects UI-affecting changes (frontend file globs *.tsx|*.css|*.html, or
        explicit captain --design flag). Drives design-stage conditional skip-when. Set by
        ship-shape SKILL during shape stage based on Mode A/B/C trigger detection.
    domain:
      type: string
      optional: true
      set_at: shape
      default: unset
      description: |
        Domain registry name (e.g., "schema") set by ship-shape Phase 8.5 via
        plugins/ship-flow/lib/registry-resolve.sh --classify on spec.md. Drives
        design-stage conditional skip-when (alongside affects_ui). Consumed by
        ship-design Phase 0 router for specialist dispatch (per registry's
        designer_section_anchor lookup). Empty/unset = no domain match (UI-only
        or no-trigger path). See plugins/ship-flow/registry/defaults.yaml +
        adopter override at .claude/ship-flow/domains.yaml.
    entity_type: { type: enum, values: [entity, epic], default: entity, description: "entity = normal pipeline entity; epic = decomposed into children, FO skips (status: epic bypasses stage_by_name dispatch)" }
    children: { type: list, items: string, example: '["child-slug-1", "child-slug-2"]', description: "Child entity slugs — set by ship-shape epic mode when decomposing. Epic entity status is frozen at 'epic'; children flow through the pipeline independently." }
    plugin: { type: string, pattern: "^[a-z][a-z0-9-]*$", description: "Kebab-case plugin slug — scopes entity to a plugin in a monorepo (e.g., 'ship-flow', 'spacebridge'). When set, resolve_map_path uses plugins/{plugin}/ prefix for canonical doc paths. Optional: omit for repo-root-scoped entities (backward compat)." }
    # --- Phase 1: Shape Up pattern fields (ship-flow distillation) ---
    pattern: { type: enum, values: [single, pitch, shaped-child, epic], default: single, description: "Entity role: single=standalone /ship, pitch=Shape Up parent (has appetite + rabbit_holes + deleted_from_shape + shaped children), shaped-child=born-sharped under a pitch (skips shape stage), epic=legacy carlove pattern. Default single preserves backward compat." }
    appetite: { type: string, description: "Shape Up time budget (e.g., '2 days', '2 weeks'). Not an estimate. Required when pattern=pitch.", required_when: "pattern == pitch" }
    rabbit_holes: { type: list, items: string, default: [], description: "Todo tids captured from shape as 'not this cycle'. Optional for non-pitch entities.", required_when: "pattern == pitch" }
    deleted_from_shape:
      type: list
      items:
        type: object
        schema:
          claim: { type: string, description: "What was considered" }
          reason: { type: string, description: "Why it was explicitly rejected (Musk step 2)" }
      default: []
      description: "Explicit deletes with reason — Musk step 2 discipline. Required when pattern=pitch."
      required_when: "pattern == pitch"
    parent_pitch: { type: string, example: '"081"', description: "Entity ID of the parent pitch. Required when pattern=shaped-child.", required_when: "pattern == shaped-child" }
    stated_assumptions:
      type: list
      items:
        type: object
        schema:
          id: { type: string, example: '"A1"', description: "Per-entity unique (A1, A2, ...)" }
          claim: { type: string, description: "What is being assumed" }
          verified_by: { type: enum, values: [codebase-grep, lib-docs, web-search, design-contract, skill-source-read], description: "Verification method" }
          verification: { type: string, description: "Bash command or describable procedure" }
          confidence_at_shape: { type: integer, range: "0-100", description: "Subjective confidence at shape time" }
          criticality: { type: enum, values: [critical, important, nice-to-know], description: "Blast radius if assumption is wrong" }
          notes: { type: string, description: "Optional elaboration" }
      default: []
      description: "Assumptions to verify during shape and re-verify at stage entry (Phase 4)."
      required_when: "pattern in [pitch, shaped-child]"
      invariant: "at least 1 assumption with criticality=critical when pattern=pitch"
    stage_outputs:
      type: object
      description: "Map of stage_name → relative path to stage artifact .md. Maintained by lib/register-stage-output.sh after each ship-* SKILL emits its artifact. Canonical source of truth for which stages have produced output. Body section <!-- section:stage-artifact-links --> is the derived view."
      example: '{ plan: "plan.md", execute: "execute.md" }'
    acceptance_outcome:
      type: string
      description: "User-observable answer to 'what does the captain GET when this pitch ships?' Anchors captain-gate confirm/refine. Pitch 100 source: prevents foundation-only ceremony where children produce placeholder files nothing consumes."
      required_when: "pattern == pitch"
      min_length: 50
      invariant: "must describe observable user-facing outcome, not internal artifact list"
    pre_mortem:
      type: object
      schema:
        category:
          type: enum
          values: [wrong-problem, wrong-dcs, wrong-framing-lens, hidden-dependency, over-conviction]
          description: "Named failure mode if pitch ships per spec but doesn't deliver value"
        one_liner:
          type: string
          max_words: 30
          description: "One-sentence projected failure mode in plain language"
      description: "PR #43 pre-mortem gate (rubber-stamp guard) — orthogonal future-failure axis cross-review uses as 7th rubric factor. Forces captain to name the most plausible failure mode before commit."
      required_when: "pattern in [pitch, shaped-child] AND directive non-trivial (≥80 chars OR not fix/typo/rename/bump/patch/bugfix/hotfix)"
      invariant: "category must be one of the 5 enum values; one_liner must be ≤30 words; missing pre_mortem on non-trivial pitch → cross-review VETO (loops to scope-decompose)"
      coupled_to: "ship-shape Step 5 captain gate; cross-review 7-factor rubric (axis 7: pre-mortem credibility)"
    answers_density:
      type: enum
      values: [high, medium, low, vacuum]
      description: "Density classification (Principle 4 boolean-gate). Lazy-set at first ship-* invocation via density-classify.sh --entity=<index.md>. FO auto-proceeds (no captain gate) when value=high. External boolean surface: --is-high exits 0 iff value=high."
    captain_bet:
      type: string
      required_for: "non-trivial pitches at approve gate (same threshold as pre_mortem)"
      section_tag: captain-bet
      description: >
        Captain-authored Bet line captured in entity body at shape gate approve.
        Form: "Bet: when this ships, captain expects [observable outcome]
        within [time window]. If not, this pitch was wrong about [Layer 1 line]."
        Must be captain-authored — agent presents the template; captain fills it in.
        Agent draft then captain rubber-stamp is invalid (defeats substance commitment).
        Re-read at post-ship retro (ship + 2 weeks). Outcome match = primary
        substance-level success signal. 3 consecutive Bet ≠ Outcome → kill criterion
        (freeze format rollout, re-shape).
      coupled_to: "ship-shape ### Captain Bet capture step; post-ship retro kill criterion"
      invariant: "content must NOT still contain [observable outcome] / [time window] / [Layer 1 line] template placeholders — those indicate agent-drafted unfilled stub"

# --- Stage Sections ---
# Each stage defines: reads (from previous stages), output, report, uat (optional)

stages:

  # ===== SHARP =====
  sharp:
    reads:
      - "PRODUCT.md (if exists)"
      - "ROADMAP.md (if exists)"
      - "Recent shipped entities (last 5)"
    output:
      section: "## Sharp Output"
      section_tag: sharp-output
      layer: decision
      subsections:
        shape_output:
          section: "### Shape Output"
          section_tag: shape-output
          layer: decision
          condition: "Only when Step 0 routes to shape path (vague directive)"
          fields:
            - { name: "Problem Statement", type: prose, description: "3-6 sentence gap description" }
            - { name: "User Stories", type: list, format: "US-{N}: As a {role}, I want {action}, so that {value}" }
            - { name: "Scope In", type: list, description: "Concrete deliverables, each verifiable" }
            - { name: "Scope Out", type: list, description: "Explicit exclusions with WHY" }
        roadmap_position:
          section: "### Roadmap Position"
          section_tag: roadmap-position
          layer: decision
          fields:
            - { name: content, type: prose, description: "Where this fits, dependencies, related shipped" }
        problem:
          section: "### Problem"
          section_tag: problem
          layer: decision
          fields:
            - { name: content, type: prose, description: "Specific problem statement" }
        done_criteria:
          section: "### Done Criteria"
          section_tag: done-criteria
          layer: decision
          fields:
            - name: items
              type: list
              format: "- [ ] `{type}` — DC-{N}: {assertion} (journey step {M})"
              types: [cli, api, ui, skill, e2e]
              description: "Typed, observable, traceable to journey step"
        user_journey:
          section: "### User Journey"
          section_tag: user-journey
          layer: decision
          fields:
            - { name: "Persona", type: string }
            - { name: "Goal", type: string }
            - { name: "Entry point", type: string }
            - name: steps
              type: table
              columns: ["#", "Step", "Type", "Boundary", "Risk"]
              description: "Each step becomes a Done Criterion"
        journey_dc_mapping:
          section: "### Journey → DC Mapping"
          section_tag: journey-dc-mapping
          layer: decision
          fields:
            - name: mapping
              type: table
              columns: ["Journey Step", "DC", "Type", "Boundary", "Verify hint"]
        architecture_impact:
          section: "### Architecture Impact"
          section_tag: architecture-impact
          layer: decision
          optional: true
          purpose: "Entity-declared architectural change. Consumed by ship-review to patch ARCHITECTURE.md atomically with read-first CAS."
          fields:
            - name: target_section
              required: true
              type: enum
              values: [context, containers, components, constraints, dependencies, decisions]
              purpose: "Which ARCHITECTURE.md section this entity patches (per flow-map-schema.yaml)"
            - name: summary
              required: true
              type: string
              purpose: "1-3 sentence prose summary of the architectural change (feeds commit message)"
            - name: before
              required: true
              type: markdown
              purpose: "Current section content (for freshness check); pre-filled by ship-shape via extract-map.sh"
            - name: after
              required: true
              type: markdown
              purpose: "New section content to commit (must include mermaid block if target_section requires_diagram)"
            - name: rationale
              required: false
              type: prose
              purpose: "Why this decision (optional; entity body provides fuller context)"
        product_impact:
          section: "### Product Impact"
          section_tag: product-impact
          layer: decision
          optional: true
          purpose: "Entity-declared product documentation change. Consumed by ship-review to patch PRODUCT.md atomically."
          fields:
            - name: target_section
              required: true
              type: string
              purpose: "Which PRODUCT.md section this entity patches"
            - name: summary
              required: true
              type: string
              purpose: "1-3 sentence prose summary of the product change (feeds commit message)"
            - name: before
              required: true
              type: markdown
              purpose: "Current section content (for freshness check)"
            - name: after
              required: true
              type: markdown
              purpose: "New section content to commit"
            - name: rationale
              required: false
              type: prose
              purpose: "Why this product change (optional; entity body provides fuller context)"
        readme_impact:
          section: "### README Impact"
          section_tag: readme-impact
          layer: decision
          optional: true
          purpose: "Entity-declared README.md change. Consumed by ship-review to patch README.md atomically."
          fields:
            - name: target_section
              required: true
              type: string
              purpose: "Which README.md section this entity patches"
            - name: before
              required: true
              type: markdown
              purpose: "Current section content (for freshness check)"
            - name: after
              required: true
              type: markdown
              purpose: "New section content to commit"
            - name: rationale
              required: false
              type: prose
              purpose: "Why this README change (optional)"
            - name: entry_critical
              required: false
              type: boolean
              purpose: "True if this README entry is user-facing critical (e.g. install instructions, breaking change notice)"
        size_assessment:
          section: "### Size Assessment"
          section_tag: size-assessment
          layer: decision
          fields:
            - { name: "Size", type: enum, values: [S, M, L] }
            - { name: "Token budget", type: string }
            - { name: "Reasoning", type: prose }
        musk_audit:
          section: "### Musk Audit"
          section_tag: musk-audit
          layer: decision
          fields:
            - { name: "Fastest path", type: prose }
            - { name: "Purpose", type: prose }
            - { name: "Position", type: prose }
            - { name: "Gap-to-goal", type: prose }
            - { name: "Per-bullet audit", type: prose, description: "KEEP/DEFER/DELETE verdicts" }
        scoring_gate:
          section: "### Scoring Gate"
          section_tag: scoring-gate
          layer: decision
          fields:
            - { name: "Result", type: enum, values: [PASS, FAIL] }
            - { name: "Score", type: number, range: "0.0-1.0" }
        project_skills:
          section: "### Project Skills"
          section_tag: project-skills
          layer: decision
          fields:
            - { name: source, type: enum, values: [manual, discovered, mixed], description: "Where project-scope skill routing came from" }
            - { name: routing_config, type: path, description: "Usually .claude/ship-flow/skill-routing.yaml" }
            - { name: content, type: list, description: "Available project-scope skills and file-signal routes" }
    report:
      section: "## Sharp Report"
      section_tag: sharp-report
      layer: implementation
      fields:
        - { name: status, type: enum, values: [passed, rejected, blocked], grepable: true }
        - { name: stage_cost, type: string, format: "$X.XX (description)", grepable: true }
        - { name: path, type: enum, values: [shape+sharp, sharp-only, escape-hatch] }
    uat: null  # sharp defines DC, doesn't verify
    hand_off_to_design:
      section: "### Hand-off to Design"
      section_tag: hand-off-to-design
      layer: decision
      description: "Explicit hand-off from shape/sharp to design stage. Consumed by design stage Boot Self-Check."
      fields:
        - { name: ui_surfaces, type: list, description: "Visible UI surfaces requiring design attention" }
        - { name: framework_detected, type: string, description: "Output from ship-runtime-detect Step R5 (framework + theme_indirection)" }
        - { name: design_canonical_dir, type: string, description: "Path to design system canonical dir (e.g., plugins/<app>/design/)" }
        - { name: open_design_questions, type: list, description: "Design decisions still unresolved — must be resolved in design stage" }
        - { name: pm_framing_output, type: string, description: "Reference to problem-framing-canvas / press-release artifacts if run in shape stage" }

  # ===== PLAN =====
  # ===== DESIGN =====
  design:
    reads:
      - "## Sharp Output → Problem (exploration cite, contradictions)"
      - "## Sharp Output → Done Criteria (UI-typed, design-affected)"
    output:
      section: "## Design Output"
      section_tag: design-output
      layer: design
      subsections:
        captain_decisions:
          section: "### Captain Decisions"
          section_tag: captain-decisions
          layer: design
          fields:
            - name: items
              type: list
              format: "- **D{N}|Captain decision**: {claim} (ref: {file}:{line} contradiction pair)"
              description: "Each contradiction-resolved decision; >=6 for non-trivial pitches"
        artifact_bundle:
          section: "### Artifact Bundle Manifest"
          section_tag: artifact-bundle
          layer: design
          fields:
            - name: artifacts
              type: table
              columns: ["Path", "Type", "Purpose"]
              description: "design-system.md / tokens.css / specimens / composite mockup"
        # G8 dedup (2026-04-29, PR #44): plan_constraints subsection retired.
        # Single-source-of-truth = stages.design.hand_off_to_plan.design_constraints[].
        # Rationale: dual-write let captain edits diverge between the two blocks,
        # leaving plan stage reading stale or contradictory data.
        # Migration: bash plugins/ship-flow/lib/migrate-design-constraints.sh <entity>
    report:
      section: "## Design Report"
      section_tag: design-report
      layer: design
      fields:
        - { name: status, type: enum, values: [passed, gaps-noted, blocked, partial], grepable: true }
        - { name: stage_cost, type: string, format: "$X.XX (N dispatches: breakdown)", grepable: true }
        - { name: iterations, type: string, description: "N (Q-loop iterations) + 1 (cross-review)" }
        - { name: contradictions_resolved, type: number }
        - { name: captain_decisions, type: number }
        - { name: reviewer_verdict, type: enum, values: [PROCEED, VETO, PROMPT_CAPTAIN] }
    uat: null  # design defines visual contract, does not verify
    hand_off_to_plan:
      section: "### Hand-off to Plan"
      section_tag: hand-off-to-plan
      layer: design
      description: "Single-source-of-truth contract from design to plan (G8 dedup, PR #44). Consumed by plan Step 1.6 Import Design DCs."
      fields:
        - name: design-skipped
          type: boolean
          default: false
          description: "G14 (2026-04-29): set true by ship-shape Phase 8 when affects_ui=false — design intentionally bypassed, plan Step 1.6 short-circuits. When false (or absent), design-emitted fields below are required."
          required: true
          mutually_exclusive_with: "design_constraints, render_fidelity_targets (when design-skipped=true, these MUST be empty/omitted)"
        - name: design_constraints
          type: list
          items:
            type: object
            schema:
              type:
                type: enum
                values: [token-binding, layout, interaction, contract, schema-contract, filter-contract, api-contract, data-contract, domain-contract]
                description: "G9 (2026-04-29): structured constraint type. token-binding/layout/interaction cover UI design; contract/schema-contract/filter-contract/api-contract/data-contract/domain-contract cover non-UI domain specialist hand-offs."
              assertion:
                type: string
                description: "Machine-checkable assertion text — feeds plan Step 1.6 ui DC encode. Format: '<selector>.<property> = <expected>' or behavioral predicate."
              rationale_decision:
                type: string
                pattern: "^D[0-9]+$"
                description: "G12 (2026-04-29): MUST cross-reference a **D{N}|Captain decision** in Phase 8 Captain Decisions. Validated by validate-d-references.sh."
              source_artifact:
                type: string
                description: "Path to design artifact establishing this constraint (e.g., plugins/<app>/design/tokens.css, components/<name>.html)"
          required_when: "design-skipped == false"
          description: "Visual / token / interaction constraints plan MUST honor. Each item structured (G9). D{N} backref enforced (G12)."
        - { name: open_decisions, type: list, description: "Design decisions still pending captain input. Non-empty → plan Step 1.6 BLOCKER (bounce to designer@pitch-XX)." }
        - name: artifact_paths
          type: list
          items:
            type: object
            schema:
              path: { type: string, description: "Repo-relative path to artifact" }
              sha256: { type: string, description: "Optional checksum for drift detection (loophole #11, deferred — emit when supported)" }
          description: "Design artifact paths (tokens.css, specimens, mockups). sha256 deferred until lib supports."
        - name: render_fidelity_targets
          type: list
          items:
            type: object
            schema:
              selector:
                type: string
                description: "CSS selector targeting the element (e.g., '.cta-button', '[data-testid=\"sidebar\"]')"
              css_property:
                type: string
                description: "CSS property name to assert (e.g., 'background-color', 'display', 'flex-direction')"
              expected_value:
                type: string
                description: "Expected resolved computed-style value. For tokens use the resolved value, e.g., 'rgb(59, 130, 246)' resolved from var(--primary). ui-verify backend reads tokens.css to resolve indirection."
              rationale_decision:
                type: string
                pattern: "^D[0-9]+$"
                description: "G12 (2026-04-29): cross-reference Phase 8 Captain Decision."
          required_when: "design-skipped == false"
          description: "G12 structured (2026-04-29). Feeds plan Step 1.6 ui-typed DC + ship-verify Step 3.6 ui-verify spec. Each target = one computed-style assertion."
        - name: whole_page_visual_targets
          type: list
          items:
            type: object
            schema:
              route:
                type: string
                description: "Runtime route or URL path to capture for full-page visual parity."
              reference_artifact:
                type: string
                description: "Repo-relative HTML mockup or reference image used as the whole-page design target."
              capture:
                type: enum
                values: [full-page screenshot, viewport screenshot]
                description: "Capture mode. Use full-page screenshot unless the UI is a fixed-size embedded widget."
              threshold:
                type: string
                description: "Acceptable visual delta policy, e.g. 'warn>1%, block composition mismatch'."
              rationale_decision:
                type: string
                pattern: "^D[0-9]+$"
                description: "G12-style cross-reference to Phase 8 Captain Decision."
          description: "Route-level visual parity target. Complements render_fidelity_targets[] fragment checks; prevents fragment-level ui-verify from masking whole-page composition drift."
        - { name: storyboard_frames, type: list, description: "6-frame user-flow narrative from Phase 1.5 storyboard skill — each frame has actor + action/state + expectation. Verifier uses frames as render-fidelity contract; any unsatisfied frame BLOCKS at review stage." }

  plan:
    reads:
      - "## Sharp Output (all subsections)"
      - "PRODUCT.md ## Architecture and ## Constraints"
    output:
      section: "## Plan Output"
      section_tag: plan-output
      layer: implementation
      subsections:
        research_summary:
          section: "### Research Summary"
          section_tag: research-summary
          layer: implementation
          fields:
            - { name: content, type: prose, description: "Key findings or 'Size S — no research needed'" }
            - { name: open_questions, type: list, condition: "If contradictory research" }
            - { name: reviewer_assessment, type: enum, values: [APPROVED, GAPS_ADDRESSED] }
        size_reevaluation:
          section: "### Size Re-evaluation"
          section_tag: size-reevaluation
          layer: implementation
          fields:
            - { name: "Sharp estimate", type: enum, values: [S, M, L] }
            - { name: "Research evidence", type: prose }
            - { name: "Adjusted size", type: string }
            - { name: "Token budget", type: string, condition: "If changed" }
        verification_spec:
          section: "### Verification Spec"
          section_tag: verification-spec
          layer: implementation
          description: "Exact verify procedure per Done Criterion. Consumed by execute and verify."
          fields:
            - name: spec
              type: table
              columns: ["DC", "Type", "Assertion", "Verify Procedure", "Expected"]
              rules:
                - "Every DC from ## Done Criteria must have a row"
                - "Verify Procedure must be a runnable command (no 'manual check')"
                - "Type must match the DC's type"
        plan:
          section: "### Plan"
          section_tag: plan
          layer: implementation
          fields:
            - name: tasks
              type: list
              format: |
                #### Task {N}: {name}
                **Wave:** {0|1|2|...}
                **Files:** {create/modify with exact paths}
                **Read first:** {files to read before starting}
                **Skills needed:** {skills_needed: ["skill-a", "skill-b"] — string array, per-task, derived from files_modified}
                **TDD:** {tdd_contract: red_command, expected_red_failure, green_command, refactor_check OR TDD: skip -- <reason>}
                **Parallel:** {parallel_group, depends_on[], owned_paths[], integration_owner}
                **Steps:** {numbered, with code blocks}
                **Done:** {runnable verification command}
                **Model:** {haiku | sonnet}
              task_fields:
                - { name: skills_needed, type: list, items: string, description: "Per-task skill names to load before dispatch. Derived by ship-plan from files_modified globs, framework_detected, density skill set, domain registry required_skills / skill_hints, adopter skill-routing.yaml, and non-root folder guidance skills." }
                - { name: tdd_contract, type: object, description: "Required for non-exempt code tasks. Contains red_command, expected_red_failure, green_command, and refactor_check; exempt tasks omit tdd_contract and include the TDD: skip -- <reason> marker in task prose." }
                - { name: parallel_group, type: string, description: "Required on every task. Use 'serial' when the task cannot run with peers. Tasks in the same non-serial group may run in parallel only when depends_on is satisfied and owned_paths are disjoint." }
                - { name: depends_on, type: list, items: string, description: "Task IDs that must finish before this task can start. Execute never starts a task until every dependency is committed." }
                - { name: owned_paths, type: list, items: string, description: "Exclusive file/path globs this task may write. Parallel tasks must not overlap owned_paths." }
                - { name: integration_owner, type: string, description: "Named teammate responsible for folding this task's output into the stage artifact; usually executer@pitch-XX for execute tasks." }
    report:
      section: "## Plan Report"
      section_tag: plan-report
      layer: implementation
      fields:
        - { name: status, type: enum, values: [passed, gaps-noted, blocked], grepable: true }
        - { name: stage_cost, type: string, format: "$X.XX (N dispatches: breakdown)", grepable: true }
        - { name: iterations, type: string, description: "N (self-review) + 1 (reviewer)" }
        - { name: dimensions, type: string, description: "8 dimensions, which passed/failed" }
        - { name: reviewer_verdict, type: enum, values: [APPROVED, REVISE_FIXED] }
        - { name: scope_anchoring, type: string }
        - { name: task_count, type: number }
        - { name: model_split, type: string, description: "N haiku, M sonnet" }
    uat: null  # plan defines procedures, doesn't verify
    hand_off_to_execute:
      section: "### Hand-off to Execute"
      section_tag: hand-off-to-execute
      layer: implementation
      description: "Explicit hand-off from plan to execute stage. Consumed by execute stage Boot Self-Check."
      fields:
        - { name: wave_order, type: string, description: "Wave dispatch order (W0 → W1 → W2a/b/c → W3 → W4)" }
        - name: plan_parallelization_manifest
          type: table
          description: "Planner-owned manifest listing parallel_group, depends_on, owned_paths, and integration_owner for every task. Source for execute-dispatch-manifest."
          columns: ["Task ID", "Parallel Group", "Depends On", "Owned Paths", "Integration Owner"]
        - { name: critical_assumptions, type: list, description: "Assumptions to re-verify at execute boot" }
        - { name: architecture_context, type: string, description: "Canonical doc touches required (INVARIANTS, README, schema)" }
        - { name: stub_flags, type: list, description: "Tasks flagged as v1-stub requiring captain-ack before cross-review PROCEED" }
        - { name: folder_guidance, type: list, description: "Per task: non-root AGENTS.md/CLAUDE.md files and folder_guidance_skills resolved from touched files. Root AGENTS.md/CLAUDE.md are excluded as Codex session context via codex_context_boundary." }

  # ===== EXECUTE =====
  execute:
    reads:
      - "## Plan Output (all subsections)"
      - "## Sharp Output → Done Criteria"
    output:
      section: "## Execute Output"
      section_tag: execute-output
      layer: implementation
      subsections:
        execution_log:
          section: "### Execution Log"
          section_tag: execution-log
          layer: implementation
          fields:
            - name: tasks
              type: table
              columns: ["Task", "Wave", "Model", "Status", "Files Changed", "Retries", "Review", "Commit", "Est. Cost"]
            - name: execute-dispatch-manifest
              type: table
              columns: ["Task", "Parallel Group", "Depends On", "Owned Paths", "Integration Owner", "Dispatch Mode"]
              description: "Executer-owned manifest derived from plan_parallelization_manifest. Dispatch Mode is parallel only when dependencies are satisfied and owned paths are disjoint."
            - name: tdd_evidence
              type: table
              columns: ["Task", "RED Command", "Expected RED Failure", "GREEN Command", "REFACTOR Check", "Result"]
              description: "Per-task RED-before-GREEN evidence consumed by verify. Required for non-exempt code tasks."
            - { name: escalations, type: list, condition: "If any BLOCKED→escalated" }
            - { name: frontend_smoke, type: enum, values: [PASS, FAIL, N/A] }
            - { name: scope_observations, type: list, condition: "If benign-drift auto-proceeds" }
        issues_found:
          section: "### Issues Found"
          section_tag: issues-found
          layer: implementation
          fields:
            - { name: items, type: list, format: "{finding} → auto-created entity #{slug}" }
        knowledge_captures:
          section: "### Knowledge Captures"
          section_tag: knowledge-captures
          layer: implementation
          fields:
            - { name: d1_items, type: list, format: "[D1] {pattern}", description: "Skill-level, auto-write" }
            - { name: d2_items, type: list, format: "[D2-candidate] {pattern}", description: "Project-level, captain review" }
            - { name: skipped, type: boolean, description: "True if no findings met threshold" }
    report:
      section: "## Execute Report"
      section_tag: execute-report
      layer: implementation
      fields:
        - { name: status, type: enum, values: [passed, failed, blocked], grepable: true }
        - { name: stage_cost, type: string, format: "$X.XX (N dispatches: breakdown)", grepable: true }
        - { name: tasks_summary, type: string, description: "N done, M blocked, K needs-context-rounds" }
        - { name: knowledge_capture, type: string, description: "D1: N, D2: M | skipped" }
    uat:
      section: "## Execute UAT"
      section_tag: execute-uat
      layer: implementation
      description: "First-pass AC verification. Not authoritative — verify stage re-runs independently."
      fields:
        - name: results
          type: table
          columns: ["DC", "Type", "Assertion", "Verify Procedure", "Result", "Evidence"]
    hand_off_to_verify:
      section: "### Hand-off to Verify"
      section_tag: hand-off-to-verify
      layer: implementation
      description: "Explicit hand-off from execute to verify stage. Consumed by verify stage Boot Self-Check."
      fields:
        - { name: commit_list, type: list, description: "All commits landed (SHA + task ID + summary)" }
        - { name: dc_status, type: list, description: "Execute-side DC results (PASS/FAIL per DC)" }
        - { name: tdd_evidence_summary, type: list, description: "Per-task summary of RED-before-GREEN evidence or TDD: skip -- <reason> exemptions." }
        - { name: deviations, type: list, description: "Any plan deviations with rationale" }
        - { name: render_fidelity_evidence, type: string, description: "Dev server URL or screenshot path for UI-type entities" }
        - { name: context_read_receipts, type: list, description: "Per-task proof that execute workers read required folder_guidance files and loaded routed/folder skills." }

  # ===== VERIFY =====
  # 2026-04-19 D1 measurement consolidation: 3 sections (Output, Report, UAT) merged into one ## Verify
  # with 5 subsections. Reduces artifact count, ship-review reads single section. Backward compat:
  # ship-review and ship-execute (pr-feedback mode) also accept legacy ## Verify Output / ## Verify Report / ## Verify UAT
  # for entities written before 2026-04-19 (no migration needed — old entities are terminal).
  verify:
    reads:
      - "## Execute Output (all subsections)"
      - "## Plan Output → Verification Spec"
      - "## Sharp Output → Done Criteria"
      - "PRODUCT.md ## Constraints"
    output:
      section: "## Verify"
      section_tag: verify
      layer: implementation
      subsections:
        quality_gate:
          section: "### Quality Gate"
          section_tag: quality-gate
          layer: implementation
          fields:
            - name: checks
              type: list
              format: "- {check}: {PASS|FAIL} ({evidence})"
              items: [tests, lint, typecheck, build, format]
              rules:
                - "checks 1-4 all FAIL → feedback to execute"
                - "check 5 (format) is advisory"
        review_findings:
          section: "### Review Findings"
          section_tag: review-findings
          layer: implementation
          fields:
            - { name: scope, type: string, description: "N files, M reviewers dispatched" }
            - name: prescan
              type: object
              fields:
                - { name: stale_references, type: string }
                - { name: plan_consistency, type: string }
                - { name: constraint_check, type: string }
                - { name: claude_md_walk, type: string }
            - { name: spot_check, type: string, description: "N/M citations verified" }
            - name: findings
              type: table
              columns: ["Severity", "File:Line", "Description", "Source"]
              severity_values: [BLOCKING, WARNING, NIT]
            - name: tdd_evidence_audit
              type: table
              columns: ["Task", "RED Evidence", "GREEN Evidence", "REFACTOR Check", "Severity", "route_to"]
              severity_values: [BLOCKING, WARNING, NIT]
              description: "Verify-stage audit of execute tdd_evidence. Missing or invalid RED-before-GREEN evidence routes to execute."
            - { name: verdict, type: string, description: "SHIP IT | NEEDS_FIX | escalated" }
        knowledge_captures:
          section: "### Knowledge Captures"
          section_tag: verify-knowledge-captures
          layer: implementation
          fields:
            - { name: d1_items, type: list, format: "[D1] {pattern}" }
            - { name: d2_items, type: list, format: "[D2-candidate] {pattern}" }
            - { name: skipped, type: boolean }
        uat:
          section: "### UAT"
          section_tag: uat
          layer: implementation
          description: "Evidence review + spot-check (D1 2026-04). Falls back to full re-run if execute evidence is unreliable."
          fields:
            - { name: mode, type: enum, values: [spot-check, "full-rerun"], description: "spot-check is default; full-rerun is fallback" }
            - name: results
              type: table
              columns: ["DC", "Type", "Assertion", "Verify Procedure", "Execute 1st", "Verify", "Evidence"]
              verify_column_values: ["spot-checked", "trust (evidence: <ref>)", "re-run (fallback)"]
        verdict:
          section: "### Verdict"
          section_tag: verify-verdict
          layer: implementation
          description: "Authoritative outcome — replaces legacy ## Verify Report. FO grep-reads `status:` line."
          fields:
            - { name: status, type: enum, values: [passed, failed], grepable: true }
            - { name: stage_cost, type: string, format: "$X.XX (N dispatches: breakdown)", grepable: true }
            - { name: quality, type: string, description: "5/5 pass" }
            - { name: review, type: string, description: "verdict from review findings" }
            - { name: uat, type: string, description: "all pass | N failed" }
            - { name: blocking_issues, type: string, description: "none | list" }
            - { name: knowledge_capture, type: string, description: "D1: N, D2: M | skipped" }
            - { name: started_at, type: string, format: "ISO 8601" }
            - { name: completed_at, type: string, format: "ISO 8601" }
            - { name: duration_minutes, type: number }
        render_fidelity:
          section: "### Render Fidelity"
          section_tag: render-fidelity
          layer: implementation
          description: "Step 4.5 output (T6.3, #106) — mandatory for UI-type entities. Compares live rendered output vs design canonical tokens."
          fields:
            - { name: render_fidelity_status, type: enum, values: [pass, fail, not-applicable], grepable: true }
            - name: component_table
              type: table
              columns: ["Component", "Expected token", "Rendered value", "Match?"]
            - { name: design_decisions_honored, type: list, format: "D{N}: {decision} → {rendered-outcome} (pass|fail)" }
            - { name: screenshot_paths, type: list, description: "≥1 screenshot for primary affected route" }
            - { name: fake_button_detected, type: boolean, description: "True if <div onClick> detected instead of <button>" }
        verify_check_manifest:
          section: "### Verify Check Manifest"
          section_tag: verify-check-manifest
          layer: implementation
          description: "Verifier-owned manifest of parallel checks. The verifier remains the single integrator for the final verdict."
          fields:
            - name: checks
              type: table
              columns: ["Check", "Input", "Owner", "Can Run Parallel", "Evidence Required"]
            - name: review_lenses
              type: table
              description: "Reviewer panel lenses dispatched by ship-verify. General and silent-failure lenses are baseline for source diffs; domain lenses are derived from domain registry, skills_needed, adopter file signals, and touched files."
              columns: ["Lens", "Source", "Required Skills", "Input Bundle", "Fallback"]
              allowed_lenses: ["general-external-reviewer", "silent-failure-reviewer", "domain-expert-reviewer"]
            - name: reviewer_output_matrix
              type: table
              description: "Schema-backed output from pr-review-toolkit or ship-flow:verify-reviewer-panel."
              columns: ["Lens", "Verdict", "Finding", "file_line", "route_to", "Evidence"]
              column_formats:
                file_line: "<path:line>"
    legacy_sections:
      description: "Pre-2026-04-19 layout used 3 separate H2 sections. Readers (ship-review, ship-execute pr-feedback mode) accept both layouts."
      sections:
        - "## Verify Output (legacy → ## Verify with ### Quality Gate, ### Review Findings, ### Knowledge Captures)"
        - "## Verify Report (legacy → ## Verify → ### Verdict)"
        - "## Verify UAT (legacy → ## Verify → ### UAT)"
    hand_off_to_review:
      section: "### Hand-off to Review"
      section_tag: hand-off-to-review
      layer: implementation
      description: "Explicit hand-off from verify to review stage. Consumed by review stage Boot Self-Check."
      fields:
        - { name: verify_verdict, type: string, description: "passed | failed — authoritative verify outcome" }
        - { name: blocking_issues, type: list, description: "Any BLOCKING findings from verify; must be empty for PROCEED" }
        - { name: canonical_docs_touched, type: list, description: "INVARIANTS / README / schema changes confirmed in execute" }
        - { name: render_fidelity_status, type: string, description: "Result of ## Render Fidelity subsection (pass | not-applicable)" }

  # ===== SHIP =====
  ship:
    reads:
      # Primary (post-2026-04-19 layout):
      - "## Verify → ### Verdict (status: must be passed)"
      - "## Verify → ### UAT (results table)"
      - "## Verify → ### Quality Gate"
      # Legacy fallback (pre-2026-04-19): if ## Verify section absent, fall back to:
      - "## Verify Report (legacy — must be PASS)"
      - "## Verify UAT (legacy)"
      - "## Verify Output → ### Quality Gate (legacy)"
      # Always:
      - "## Execute Output → Execution Log"
      - "## Sharp Output → Problem, Done Criteria, Shape Output"
      - "PRODUCT.md, ROADMAP.md"
    output:
      # 2026-04-19 D1 consolidation: ## Ship Output + ## Ship Report merged into single ## Ship.
      # Verdict subsection replaces top-level Ship Report. Pr-merge mod accepts both layouts.
      section: "## Ship"
      section_tag: ship
      layer: implementation
      subsections:
        pr_draft:
          section: "### PR Draft"
          section_tag: pr-draft
          layer: implementation
          fields:
            - { name: title, type: string }
            - name: body
              type: prose
              includes:
                - "## Problem (from Sharp Output)"
                - "## User Journey (from Sharp Output)"
                - "## Done Criteria + Verification (full UAT table from Verify → ### UAT, or legacy ## Verify UAT)"
                - "## Changes (from Execute Output → Execution Log)"
                - "## Quality Gate (from Verify → ### Quality Gate, or legacy ## Verify Output → ### Quality Gate)"
                - "Entity ID, tracker, cost footer"
        roadmap_update:
          section: "### ROADMAP.md Update"
          section_tag: roadmap-update
          layer: implementation
          condition: "Only when ROADMAP.md exists and was modified"
          fields:
            - { name: action, type: string, description: "Moved from Now → Shipped" }
        product_update:
          section: "### PRODUCT.md Update"
          section_tag: product-update
          layer: implementation
          condition: "Only when PRODUCT.md exists and was modified"
          fields:
            - { name: capabilities_added, type: number }
            - { name: stories_added, type: number }
        d2_surfacing:
          section: "### D2 Knowledge Candidates"
          section_tag: d2-knowledge-candidates
          layer: implementation
          condition: "Only if [D2-candidate] items exist in execute/verify Knowledge Captures"
          fields:
            - { name: candidates, type: list, description: "Presented to captain for CLAUDE.md approval" }
        token_summary:
          section: "### Token Summary"
          section_tag: token-summary
          layer: implementation
          fields:
            - { name: budget, type: string }
            - { name: actual, type: string }
            - { name: ratio, type: string }
        verdict:
          section: "### Verdict"
          section_tag: ship-verdict
          layer: implementation
          description: "Authoritative outcome — replaces legacy ## Ship Report. FO grep-reads `status:` line."
          fields:
            - { name: status, type: enum, values: [shipped, blocked], grepable: true }
            - { name: stage_cost, type: string, format: "$X.XX (description)", grepable: true }
            - { name: pr, type: string }
            - { name: token_budget, type: string }
            - { name: token_actual, type: string }
            - { name: tasks, type: string, description: "done/total (failed, issues)" }
            - { name: verify, type: string }
            - { name: roadmap, type: string, description: "omit if no ROADMAP update" }
            - { name: product, type: string, description: "omit if no PRODUCT update" }
            - { name: started_at, type: string, format: "ISO 8601" }
            - { name: completed_at, type: string, format: "ISO 8601" }
            - { name: duration_minutes, type: number }
    legacy_sections:
      description: "Pre-2026-04-19 layout used ## Ship Output + separate ## Ship Report. Pr-merge mod accepts both layouts; no migration of archived entities needed."
      sections:
        - "## Ship Output (legacy → ## Ship with same subsections)"
        - "## Ship Report (legacy → ## Ship → ### Verdict)"
    uat: null  # ship doesn't verify — verify already passed
    hand_off_to_ship:
      section: "### Hand-off to Ship"
      section_tag: hand-off-to-ship
      layer: implementation
      description: "Explicit hand-off from review to ship stage. Consumed by ship stage Boot Self-Check."
      fields:
        - { name: pr_url, type: string, description: "PR URL ready for merge" }
        - { name: review_verdict, type: string, description: "PROCEED verdict from review cross-review gate" }
        - { name: captain_ack_stubs, type: list, description: "Stub flags cleared or pre-acked by captain" }
        - { name: roadmap_row_ready, type: boolean, description: "ROADMAP.md Now → Shipped row prepared" }

  # ===== REVIEW =====
  review:
    reads:
      - "## Verify → ### Verdict (status: must be passed)"
      - "## Execute Output → Execution Log"
      - "## Sharp Output → Architecture Impact"
      - "PRODUCT.md, ROADMAP.md"
    output:
      section: "## Review"
      section_tag: review
      layer: implementation
      subsections:
        pr_draft:
          section: "### PR Draft"
          section_tag: review-pr-draft
          layer: implementation
          fields:
            - { name: title, type: string }
            - name: body
              type: prose
              includes:
                - "## Problem (from Sharp Output)"
                - "## Done Criteria + Verification (from Verify UAT)"
                - "## Changes (from Execute Output → Execution Log)"
                - "## Quality Gate (from Verify → ### Quality Gate)"
                - "Entity ID, tracker, cost footer"
        roadmap_md_update:
          section: "### ROADMAP.md Update"
          section_tag: review-roadmap-update
          layer: implementation
          condition: "Only when ROADMAP.md exists and entity moved stage"
          fields:
            - { name: action, type: string, description: "Section moved (Now → Shipped, or similar)" }
            - { name: patch_via, type: string, default: "patch-map.sh --mode=remove-row + append shipped" }
        product_md_update:
          section: "### PRODUCT.md Update"
          section_tag: review-product-update
          layer: implementation
          condition: "Only when PRODUCT.md exists and capabilities changed"
          fields:
            - { name: capabilities_added, type: number }
            - { name: stories_added, type: number }
        umbrella_closeout:
          section: "### Umbrella Closeout"
          section_tag: review-umbrella-closeout
          layer: implementation
          condition: "Required for shaped-child, pitch, epic, or children[] entities"
          fields:
            - { name: required, type: boolean }
            - { name: parent, type: string, description: "Parent pitch/epic id or slug when applicable" }
            - { name: roadmap_action, type: string, description: "Moved parent Now/Next → Shipped, or skipped with rationale" }
            - { name: product_action, type: string, description: "Updated parent aggregate capability, or skipped with rationale" }
            - { name: architecture_action, type: string, description: "Updated architecture-impact, or skipped with rationale" }
        architecture_changes:
          section: "### Architecture Changes"
          section_tag: review-architecture-changes
          layer: implementation
          condition: "Only when ## Sharp Output → ### Architecture Impact is present"
          fields:
            - { name: patch_citations, type: list, format: "- {section} patched via ship-review (commit: {sha})" }
            - { name: patch_committed, type: boolean }
        d2_knowledge_candidates:
          section: "### D2 Knowledge Candidates"
          section_tag: review-d2-knowledge-candidates
          layer: implementation
          condition: "Only if [D2-candidate] items exist from execute/verify"
          fields:
            - { name: candidates, type: list, description: "Presented to captain for CLAUDE.md approval" }
        token_summary:
          section: "### Token Summary"
          section_tag: review-token-summary
          layer: implementation
          fields:
            - { name: budget, type: string }
            - { name: actual, type: string }
            - { name: ratio, type: string }
        review_report:
          section: "### Review Report"
          section_tag: review-report
          layer: implementation
          description: "Authoritative review outcome. FO grep-reads `status:` line."
          fields:
            - { name: status, type: enum, values: [passed, blocked], grepable: true }
            - { name: stage_cost, type: string, format: "$X.XX (description)", grepable: true }
            - { name: pr, type: string }
            - { name: roadmap, type: string, description: "omit if no ROADMAP update" }
            - { name: product, type: string, description: "omit if no PRODUCT update" }
            - { name: architecture, type: string, description: "omit if no architecture change" }
            - { name: started_at, type: string, format: "ISO 8601" }
            - { name: completed_at, type: string, format: "ISO 8601" }
            - { name: duration_minutes, type: number }
    uat: null  # review does not re-run UAT; verify already passed

# --- PR Feedback (re-entry) ---
pr_feedback:
  section: "## PR Review Feedback"
  section_tag: pr-review-feedback
  layer: implementation
  condition: "Written by ship-execute Step 0 (pr-feedback mode) when PR reviewer requests changes"
  fields:
    - { name: pr, type: string }
    - { name: reviewer, type: string }
    - { name: date, type: iso8601 }
    - name: comments
      type: table
      columns: ["#", "Comment", "DC", "Classification", "Route to"]
      classification_values: [assertion-fail, coverage-gap, architecture, nit]

# --- Epic Sections ---
# Written by ship-shape epic mode. Read by child entity shape and plan stages.
# Append-only: later stages add to subsections, never overwrite.

epic_context:
  section: "## Epic Context"
  section_tag: epic-context
  layer: decision
  written_by: "ship-shape (epic mode) — written once when epic entity is decomposed"
  read_by: "ship-shape (child mode Step 1), ship-plan (Step 1 — Cross-Entity Contracts)"
  grep_pattern: 'grep -A 200 "^## Epic Context" {entity_file}'
  subsections:
    architecture_decisions:
      section: "### Architecture Decisions"
      section_tag: architecture-decisions
      layer: decision
      description: "ADRs from epic-level research — auth strategy, DB schema, API boundary decisions that all children must respect"
      fields:
        - { name: decisions, type: list, format: "- **{decision}**: {rationale} — {implication for children}" }
    cross_entity_contracts:
      section: "### Cross-Entity Contracts"
      section_tag: cross-entity-contracts
      layer: decision
      description: "Shared API contracts, data schemas, and interface boundaries that children must implement consistently"
      fields:
        - { name: contracts, type: list, format: "- **{contract name}**: {definition} — implemented by {child-slug(s)}" }
    entity_decomposition:
      section: "### Entity Decomposition"
      section_tag: entity-decomposition
      layer: decision
      description: "Decomposition table — one row per child entity showing its vertical slice scope"
      fields:
        - name: table
          type: table
          columns: ["Child", "Vertical Slice", "Entry", "Exit", "Depends On"]
          rules:
            - "Each child = one complete E2E journey (entry point → observable outcome)"
            - "No child is a horizontal layer (e.g., 'all API routes' or 'all UI components')"
    shared_research:
      section: "### Shared Research"
      section_tag: shared-research
      layer: decision
      description: "Research findings from epic-level architecture research — referenced by children to avoid duplicate work"
      fields:
        - { name: findings, type: list, format: "- {finding with file:line citation}" }

parent_context:
  section: "## Parent Context"
  section_tag: parent-context
  layer: decision
  written_by: "ship-shape (child mode Step 1) — summary of what the child inherited from parent epic"
  read_by: "ship-plan (Step 1) — for Cross-Entity Contracts awareness"
  grep_pattern: 'grep -A 50 "^## Parent Context" {entity_file}'
  fields:
    - { name: epic_slug, type: string, description: "Parent entity slug" }
    - { name: inherited_decisions, type: list, description: "ADR bullets from parent ## Epic Context → ### Architecture Decisions that apply to this child" }
    - { name: contracts_to_implement, type: list, description: "Cross-Entity Contract bullets from parent ## Epic Context → ### Cross-Entity Contracts assigned to this child" }
    - { name: slice_scope, type: string, description: "This child's row from parent ## Epic Context → ### Entity Decomposition" }

stage_artifact_links:
  section: "<!-- section:stage-artifact-links -->"
  section_tag: stage-artifact-links
  layer: implementation
  written_by: "lib/render-stage-links.sh — regenerated from frontmatter stage_outputs after each ship-* SKILL advances the stage"
  read_by: "spacebridge dashboard (entity detail view) — renders stage artifact navigation links"
  description: "Derived table of stage artifacts — canonical data lives in frontmatter stage_outputs. This section is auto-maintained; do not hand-edit."
  fields:
    - { name: stage, type: string, description: "Stage name (plan, execute, verify, review, ship)" }
    - { name: file, type: link, description: "Relative markdown link to stage artifact" }

# --- Cross-Stage Conventions ---
conventions:
  section_naming: "## {Stage} {Block} — e.g., ## Sharp Output, ## Plan Report, ## Verify UAT"
  section_tag_convention: "kebab-case matching section header with stage prefix for disambiguation (e.g., verify-verdict not verdict, ship-verdict not verdict). Extract via: bash plugins/ship-flow/lib/extract-section.sh {entity-file} {section-tag}"
  layer_convention: "decision = problem/journey/criteria/ADR/scoring (stable 'what/why'); implementation = plan/execute/verify/ship artifacts (derivative 'how')"
  vertical_slice_principle: "Entities are always vertical slices — each entity is an independently deliverable and testable E2E journey, never a horizontal layer (never 'all API routes', 'all models', 'frontend only'). A vertical slice has a clear entry point, crosses all required layers, and produces an observable outcome a captain can verify."
  grepable_fields:
    - "status: — present in every Report block, FO reads for dispatch decisions"
    - "stage_cost: — present in every Report block, FO accumulates into token_actual"
  append_only: "Later stages never modify earlier stage sections. Corrections go in the current stage's Report."
  fo_parsing:
    status: 'grep "^status:" entity.md'
    cost: 'grep "^stage_cost:" entity.md'
    all_uat: 'grep -A 100 "## .*UAT" entity.md'
    knowledge: 'grep "\\[D[12]" entity.md'
    section_extract: 'bash plugins/ship-flow/lib/extract-section.sh entity.md {section-tag}'
