# Entity Body Schema
# Canonical definition of what each stage reads and writes in the entity markdown file.
# All skills and FO reference this file. Dashboard parses entities using this schema.
#
# Convention:
#   - Each stage writes up to 3 standard blocks: Output, Report, UAT
#   - Section headers use: ## {Stage} {Block}  (e.g., ## Sharp Output, ## Plan Report)
#   - Report block always contains: status, stage_cost (grepable by FO)
#   - UAT block uses the Verification Spec table format (typed DC)
#   - Sections are append-only within a stage; later stages never modify earlier sections

schema_version: "1.0"

# --- Frontmatter (YAML in entity file header) ---
frontmatter:
  required:
    id: { type: string, example: '"017"', description: "Sequential zero-padded, unique within workflow" }
    title: { type: string, example: '"DAG + Kanban view components"' }
    status: { type: enum, values: [draft, sharp, plan, execute, verify, ship, done], description: "Current pipeline stage" }
  optional:
    source: { type: string, description: "Where idea came from" }
    started: { type: iso8601, description: "When active work began" }
    completed: { type: iso8601, description: "When terminal status reached" }
    verdict: { type: enum, values: [PASSED, REJECTED] }
    score: { type: number, range: "0.0-1.0" }
    worktree: { type: string, description: "Worktree path while active" }
    parent: { type: string, example: '"003"', description: "Epic/parent entity ID" }
    depends-on: { type: list, items: string, example: '["004", "005"]', description: "DAG dependency edges" }
    tracker: { type: enum, values: [gh, linear], default: gh }
    issue: { type: string, example: '"#42"' }
    external_id: { type: string, example: '"PROJ-123"' }
    pr: { type: string }
    token_budget: { type: number, unit: USD }
    token_actual: { type: number, unit: USD, description: "Accumulated by FO across stages" }
    pr_feedback_round: { type: number, default: 0 }

# --- Stage Sections ---
# Each stage defines: reads (from previous stages), output, report, uat (optional)

stages:

  # ===== SHARP =====
  sharp:
    reads:
      - "PRODUCT.md (if exists)"
      - "ROADMAP.md (if exists)"
      - "Recent shipped entities (last 5)"
    output:
      section: "## Sharp Output"
      subsections:
        shape_output:
          section: "### Shape Output"
          condition: "Only when Step 0 routes to shape path (vague directive)"
          fields:
            - { name: "Problem Statement", type: prose, description: "3-6 sentence gap description" }
            - { name: "User Stories", type: list, format: "US-{N}: As a {role}, I want {action}, so that {value}" }
            - { name: "Scope In", type: list, description: "Concrete deliverables, each verifiable" }
            - { name: "Scope Out", type: list, description: "Explicit exclusions with WHY" }
        roadmap_position:
          section: "### Roadmap Position"
          fields:
            - { name: content, type: prose, description: "Where this fits, dependencies, related shipped" }
        problem:
          section: "### Problem"
          fields:
            - { name: content, type: prose, description: "Specific problem statement" }
        done_criteria:
          section: "### Done Criteria"
          fields:
            - name: items
              type: list
              format: "- [ ] `{type}` — DC-{N}: {assertion} (journey step {M})"
              types: [cli, api, ui, skill, e2e]
              description: "Typed, observable, traceable to journey step"
        user_journey:
          section: "### User Journey"
          fields:
            - { name: "Persona", type: string }
            - { name: "Goal", type: string }
            - { name: "Entry point", type: string }
            - name: steps
              type: table
              columns: ["#", "Step", "Type", "Boundary", "Risk"]
              description: "Each step becomes a Done Criterion"
        journey_dc_mapping:
          section: "### Journey → DC Mapping"
          fields:
            - name: mapping
              type: table
              columns: ["Journey Step", "DC", "Type", "Boundary", "Verify hint"]
        size_assessment:
          section: "### Size Assessment"
          fields:
            - { name: "Size", type: enum, values: [S, M, L] }
            - { name: "Token budget", type: string }
            - { name: "Reasoning", type: prose }
        musk_audit:
          section: "### Musk Audit"
          fields:
            - { name: "Fastest path", type: prose }
            - { name: "Purpose", type: prose }
            - { name: "Position", type: prose }
            - { name: "Gap-to-goal", type: prose }
            - { name: "Per-bullet audit", type: prose, description: "KEEP/DEFER/DELETE verdicts" }
        scoring_gate:
          section: "### Scoring Gate"
          fields:
            - { name: "Result", type: enum, values: [PASS, FAIL] }
            - { name: "Score", type: number, range: "0.0-1.0" }
        project_skills:
          section: "### Project Skills"
          fields:
            - { name: content, type: list, description: "Available project-scope skills" }
    report:
      section: "## Sharp Report"
      fields:
        - { name: status, type: enum, values: [passed, rejected, blocked], grepable: true }
        - { name: stage_cost, type: string, format: "$X.XX (description)", grepable: true }
        - { name: path, type: enum, values: [shape+sharp, sharp-only, escape-hatch] }
    uat: null  # sharp defines DC, doesn't verify

  # ===== PLAN =====
  plan:
    reads:
      - "## Sharp Output (all subsections)"
      - "PRODUCT.md ## Architecture and ## Constraints"
    output:
      section: "## Plan Output"
      subsections:
        research_summary:
          section: "### Research Summary"
          fields:
            - { name: content, type: prose, description: "Key findings or 'Size S — no research needed'" }
            - { name: open_questions, type: list, condition: "If contradictory research" }
            - { name: reviewer_assessment, type: enum, values: [APPROVED, GAPS_ADDRESSED] }
        size_reevaluation:
          section: "### Size Re-evaluation"
          fields:
            - { name: "Sharp estimate", type: enum, values: [S, M, L] }
            - { name: "Research evidence", type: prose }
            - { name: "Adjusted size", type: string }
            - { name: "Token budget", type: string, condition: "If changed" }
        verification_spec:
          section: "### Verification Spec"
          description: "Exact verify procedure per Done Criterion. Consumed by execute and verify."
          fields:
            - name: spec
              type: table
              columns: ["DC", "Type", "Assertion", "Verify Procedure", "Expected"]
              rules:
                - "Every DC from ## Done Criteria must have a row"
                - "Verify Procedure must be a runnable command (no 'manual check')"
                - "Type must match the DC's type"
        plan:
          section: "### Plan"
          fields:
            - name: tasks
              type: list
              format: |
                #### Task {N}: {name}
                **Wave:** {0|1|2|...}
                **Files:** {create/modify with exact paths}
                **Read first:** {files to read before starting}
                **Steps:** {numbered, with code blocks}
                **Done:** {runnable verification command}
                **Model:** {haiku | sonnet}
    report:
      section: "## Plan Report"
      fields:
        - { name: status, type: enum, values: [passed, gaps-noted, blocked], grepable: true }
        - { name: stage_cost, type: string, format: "$X.XX (N dispatches: breakdown)", grepable: true }
        - { name: iterations, type: string, description: "N (self-review) + 1 (reviewer)" }
        - { name: dimensions, type: string, description: "8 dimensions, which passed/failed" }
        - { name: reviewer_verdict, type: enum, values: [APPROVED, REVISE_FIXED] }
        - { name: scope_anchoring, type: string }
        - { name: task_count, type: number }
        - { name: model_split, type: string, description: "N haiku, M sonnet" }
    uat: null  # plan defines procedures, doesn't verify

  # ===== EXECUTE =====
  execute:
    reads:
      - "## Plan Output (all subsections)"
      - "## Sharp Output → Done Criteria"
    output:
      section: "## Execute Output"
      subsections:
        execution_log:
          section: "### Execution Log"
          fields:
            - name: tasks
              type: table
              columns: ["Task", "Wave", "Model", "Status", "Files Changed", "Retries", "Review", "Commit", "Est. Cost"]
            - { name: escalations, type: list, condition: "If any BLOCKED→escalated" }
            - { name: frontend_smoke, type: enum, values: [PASS, FAIL, N/A] }
            - { name: scope_observations, type: list, condition: "If benign-drift auto-proceeds" }
        issues_found:
          section: "### Issues Found"
          fields:
            - { name: items, type: list, format: "{finding} → auto-created entity #{slug}" }
        knowledge_captures:
          section: "### Knowledge Captures"
          fields:
            - { name: d1_items, type: list, format: "[D1] {pattern}", description: "Skill-level, auto-write" }
            - { name: d2_items, type: list, format: "[D2-candidate] {pattern}", description: "Project-level, captain review" }
            - { name: skipped, type: boolean, description: "True if no findings met threshold" }
    report:
      section: "## Execute Report"
      fields:
        - { name: status, type: enum, values: [passed, failed, blocked], grepable: true }
        - { name: stage_cost, type: string, format: "$X.XX (N dispatches: breakdown)", grepable: true }
        - { name: tasks_summary, type: string, description: "N done, M blocked, K needs-context-rounds" }
        - { name: knowledge_capture, type: string, description: "D1: N, D2: M | skipped" }
    uat:
      section: "## Execute UAT"
      description: "First-pass AC verification. Not authoritative — verify stage re-runs independently."
      fields:
        - name: results
          type: table
          columns: ["DC", "Type", "Assertion", "Verify Procedure", "Result", "Evidence"]

  # ===== VERIFY =====
  verify:
    reads:
      - "## Execute Output (all subsections)"
      - "## Plan Output → Verification Spec"
      - "## Sharp Output → Done Criteria"
      - "PRODUCT.md ## Constraints"
    output:
      section: "## Verify Output"
      subsections:
        quality_gate:
          section: "### Quality Gate"
          fields:
            - name: checks
              type: list
              format: "- {check}: {PASS|FAIL} ({evidence})"
              items: [tests, lint, typecheck, build, format]
              rules:
                - "checks 1-4 all FAIL → feedback to execute"
                - "check 5 (format) is advisory"
        review_findings:
          section: "### Review Findings"
          fields:
            - { name: scope, type: string, description: "N files, M reviewers dispatched" }
            - name: prescan
              type: object
              fields:
                - { name: stale_references, type: string }
                - { name: plan_consistency, type: string }
                - { name: constraint_check, type: string }
                - { name: claude_md_walk, type: string }
            - { name: spot_check, type: string, description: "N/M citations verified" }
            - name: findings
              type: table
              columns: ["Severity", "File:Line", "Description", "Source"]
              severity_values: [BLOCKING, WARNING, NIT]
            - { name: verdict, type: string, description: "SHIP IT | NEEDS_FIX | escalated" }
        knowledge_captures:
          section: "### Knowledge Captures"
          fields:
            - { name: d1_items, type: list, format: "[D1] {pattern}" }
            - { name: d2_items, type: list, format: "[D2-candidate] {pattern}" }
            - { name: skipped, type: boolean }
    report:
      section: "## Verify Report"
      fields:
        - { name: status, type: enum, values: [passed, failed], grepable: true }
        - { name: stage_cost, type: string, format: "$X.XX (N dispatches: breakdown)", grepable: true }
        - { name: quality, type: string, description: "5/5 pass" }
        - { name: review, type: string, description: "verdict from review findings" }
        - { name: uat, type: string, description: "all pass | N failed" }
        - { name: blocking_issues, type: string, description: "none | list" }
        - { name: knowledge_capture, type: string, description: "D1: N, D2: M | skipped" }
    uat:
      section: "## Verify UAT"
      description: "Independent second-pass. Authoritative — this determines PASS/FAIL."
      fields:
        - name: results
          type: table
          columns: ["DC", "Type", "Assertion", "Verify Procedure", "Execute 1st", "Verify 2nd", "Evidence"]

  # ===== SHIP =====
  ship:
    reads:
      - "## Verify Report (must be PASS)"
      - "## Execute Output → Execution Log"
      - "## Sharp Output → Problem, Done Criteria, Shape Output"
      - "## Verify UAT"
      - "PRODUCT.md, ROADMAP.md"
    output:
      section: "## Ship Output"
      subsections:
        pr_draft:
          section: "### PR Draft"
          fields:
            - { name: title, type: string }
            - name: body
              type: prose
              includes:
                - "## Problem (from Sharp Output)"
                - "## User Journey (from Sharp Output)"
                - "## Done Criteria + Verification (full UAT table from Verify UAT)"
                - "## Changes (from Execute Output → Execution Log)"
                - "## Quality Gate (from Verify Output)"
                - "Entity ID, tracker, cost footer"
        roadmap_update:
          section: "### ROADMAP.md Update"
          fields:
            - { name: action, type: string, description: "Moved from Now → Shipped" }
        product_update:
          section: "### PRODUCT.md Update"
          fields:
            - { name: capabilities_added, type: number }
            - { name: stories_added, type: number }
        d2_surfacing:
          section: "### D2 Knowledge Candidates"
          condition: "Only if [D2-candidate] items exist in execute/verify Knowledge Captures"
          fields:
            - { name: candidates, type: list, description: "Presented to captain for CLAUDE.md approval" }
        token_summary:
          section: "### Token Summary"
          fields:
            - { name: budget, type: string }
            - { name: actual, type: string }
            - { name: ratio, type: string }
    report:
      section: "## Ship Report"
      fields:
        - { name: status, type: enum, values: [shipped, blocked], grepable: true }
        - { name: stage_cost, type: string, format: "$X.XX (description)", grepable: true }
        - { name: pr, type: string }
        - { name: token_budget, type: string }
        - { name: token_actual, type: string }
        - { name: tasks, type: string, description: "done/total (failed, issues)" }
        - { name: verify, type: string }
        - { name: roadmap, type: string }
        - { name: product, type: string }
    uat: null  # ship doesn't verify — verify already passed

# --- PR Feedback (re-entry) ---
pr_feedback:
  section: "## PR Review Feedback"
  condition: "Written by ship-pr-feedback skill when PR reviewer requests changes"
  fields:
    - { name: pr, type: string }
    - { name: reviewer, type: string }
    - { name: date, type: iso8601 }
    - name: comments
      type: table
      columns: ["#", "Comment", "DC", "Classification", "Route to"]
      classification_values: [assertion-fail, coverage-gap, architecture, nit]

# --- Cross-Stage Conventions ---
conventions:
  section_naming: "## {Stage} {Block} — e.g., ## Sharp Output, ## Plan Report, ## Verify UAT"
  grepable_fields:
    - "status: — present in every Report block, FO reads for dispatch decisions"
    - "stage_cost: — present in every Report block, FO accumulates into token_actual"
  append_only: "Later stages never modify earlier stage sections. Corrections go in the current stage's Report."
  fo_parsing:
    status: 'grep "^status:" entity.md'
    cost: 'grep "^stage_cost:" entity.md'
    all_uat: 'grep -A 100 "## .*UAT" entity.md'
    knowledge: 'grep "\\[D[12]" entity.md'
