# Ship-Flow Closeout Receipt Schema
# Canonical version-1 contract for docs/ship-flow/_closeouts/<closeout_id>.json.
schema_version: 1
kind: ship-flow.closeout
encoding:
  format: json
  canonical_json: "UTF-8 JSON with sorted keys and separators ',' ':'; no insignificant whitespace"
location:
  canonical: "<repo-root>/<workflow>/_closeouts/<closeout_id>.json"
  invariant: "normal validation requires explicit --repo-root; --allow-any-path is fixture-only"
identity:
  closeout_id:
    algorithm: sha256
    bytes: "v1 NUL provider NUL repository NUL workflow NUL entity_slug NUL decimal implementation_pr"
    path_binding: "receipt basename must equal <closeout_id>.json"
  fields:
    provider: { type: enum, values: [github] }
    repository: { type: string, pattern: "^[^/]+/[^/]+$" }
    workflow: { type: string, pattern: "^docs/[^/]+$" }
    entity_slug: { type: string, pattern: "^[a-z0-9][a-z0-9-]*$" }
    implementation_pr: { type: integer, minimum: 1 }
ownership_proof:
  unique_entity_matches: { type: integer, minimum: 1 }
  participant_entities:
    type: array
    items: { type: string, format: entity_slug }
    invariants:
      - "identity.entity_slug is the sole owner and is not repeated here"
      - "all other matching entities are recorded exactly once"
      - "unique_entity_matches equals one owner plus participant count"
  source_hashes:
    index: { type: sha256 }
    review: { type: sha256 }
    ship: { type: sha256 }
    description: "Exact pre-merge bytes for the owning entity's required stage artifacts"
mode: { type: enum, values: [direct, pull_request] }
merge_method_intent: { type: nullable-enum, values: [rebase, squash, merge_commit] }
deterministic_closeout_head: { type: string, format: "ship-closeout/<closeout_id>" }
landing_proof:
  type: object
  exact_keys:
    - schema_version
    - repository
    - base_ref
    - implementation_pr
    - provider_merged_at
    - landing_anchor
    - base_before
    - strategy
    - strategy_evidence
    - pr_commit_count
    - source_commit_patch_ids
    - source_patch_digest
    - landing_commits
    - landing_commit_patch_ids
    - landing_patch_digest
    - first_landing_commit
    - last_landing_commit
    - method_source
  fields:
    schema_version: { type: integer, const: 1 }
    repository: { type: string, invariant: "equals identity.repository" }
    base_ref: { type: string, format: git-ref }
    implementation_pr: { type: integer, minimum: 1, invariant: "equals identity.implementation_pr" }
    provider_merged_at: { type: string, format: RFC3339-with-timezone }
    landing_anchor: { type: 40-hex }
    base_before: { type: 40-hex }
    strategy: { type: enum, values: [rebase, squash, merge_commit] }
    strategy_evidence: { type: const, value: "topology+ordered-patch-ids+aggregate-patch-digest" }
    pr_commit_count: { type: integer, minimum: 1 }
    source_commit_patch_ids: { type: array, items: 40-hex, semantics: "ordered stable patch identities; a merge commit uses its first-parent diff, and an empty diff uses sha1('ship-flow-empty-patch-v1\\n')" }
    source_patch_digest: { type: sha256, semantics: "effective source tree delta; merge_commit uses merge-base(base_before, provider source tip) through that tip so already-synced base changes are not counted twice" }
    landing_commits: { type: array, items: 40-hex, unique: true }
    landing_commit_patch_ids: { type: array, items: 40-hex }
    landing_patch_digest: { type: sha256 }
    first_landing_commit: { type: 40-hex }
    last_landing_commit: { type: 40-hex }
    method_source: { type: enum, values: [topology, intent-discriminator] }
  structural_invariants:
    - "source_commit_patch_ids length equals pr_commit_count"
    - "source_patch_digest equals landing_patch_digest"
    - "rebase and merge_commit ordered source and landing patch IDs are equal"
    - "squash has one landing commit and one landing patch ID"
    - "rebase has pr_commit_count landing commits and patch IDs"
    - "merge_commit has pr_commit_count plus one landing commits and pr_commit_count patch IDs"
    - "first_landing_commit and last_landing_commit equal the ordered landing set boundaries"
    - "landing_anchor equals last_landing_commit"
    - "intent-discriminator requires merge_method_intent equal to strategy"
  repository_invariants:
    - "normal validation re-derives topology, ordered commits, patch IDs, and aggregate digest from Git"
    - "squash normal validation requires provider-ordered source commits and re-derives source_commit_patch_ids plus source_patch_digest from those Git objects"
    - "landing_anchor and base_before exist as commits and landing_anchor is reachable from base_ref"
    - "rebase ordered first-parent range from base_before through anchor equals landing_commits"
    - "squash anchor has one parent equal to base_before"
    - "merge_commit anchor has two parents, first parent equals base_before, and second-parent topic range plus anchor equals landing_commits"
    - "merge commits in the ordered source or landing range use stable first-parent diff identity, including topic sync merges"
    - "an empty ordinary or first-parent merge diff uses the domain-separated v1 empty-patch identity without removing that commit from the ordered proof"
    - "merge_commit source aggregate uses the common base of base_before and the provider source tip, while landing aggregate uses base_before through the anchor"
    - "Git-derived landing patch IDs and aggregate digest equal the receipt"
transaction:
  phase: { type: enum, values: [prepared, awaiting_closeout_pr, applied, complete] }
  generation: { type: integer, minimum: 1 }
  closeout_pr: { type: nullable-positive-integer }
  publication_endpoint:
    type: optional-safe-nonempty-string
    semantics: "Immutable literal provider-bound leaf used for optional closeout inspection and leased publication; absent only on direct-mode or legacy checkpoints"
  main_commit:
    type: nullable-40-hex
    semantics: "In applied or complete, equals landing_proof.landing_anchor: the implementation PR's verified authoritative main landing, never the terminal projection commit or closeout-PR merge SHA"
  legal_transitions:
    direct: [prepared-to-applied, applied-to-complete]
    pull_request: [prepared-to-awaiting_closeout_pr, awaiting_closeout_pr-to-applied, applied-to-complete]
  replay_invariants:
    - "exact identical receipt replay keeps generation unchanged"
    - "each legal transition increments generation by exactly one"
    - "identity, mode, merge_method_intent, deterministic head, proof_hash, and proof payload are immutable"
    - "closeout_pr binds only entering pull_request awaiting state, then is immutable"
    - "publication_endpoint is immutable once bound; a legacy pull_request prepared checkpoint may hydrate it once without changing generation"
    - "main_commit binds only entering applied state, then is immutable"
pull_request_merge_proof:
  invariant: "Provider state is MERGED and exact landed sentinel/output bytes validate with deterministic closeout head and closeout PR bindings"
  excludes: "transaction.main_commit; that field remains the implementation PR authoritative landing_anchor"
outputs:
  exact_keys: [debrief, ship, archived_entity, roadmap_row]
  artifact:
    exact_keys: [path, sha256]
    fields: { path: string, sha256: sha256 }
  canonical_roles:
    debrief: "<workflow>/_debriefs/<nonempty>.md"
    ship: "<workflow>/_archive/<entity_slug>/ship.md"
    archived_entity: "<workflow>/_archive/<entity_slug>/index.md"
    uniqueness: "debrief, ship, and archived_entity paths are pairwise distinct"
  roadmap_row:
    exact_keys: [identity, sha256]
    fields: { identity: entity_slug, sha256: sha256 }
    invariant: "roadmap_row.identity equals identity.entity_slug and must occupy cells[0] of exactly one row in the bounded Shipped table"
proof_hash:
  algorithm: sha256
  canonical_payload_keys: [identity, ownership_proof, landing_proof, outputs]
sentinel_validation_order:
  - path-derived closeout identity
  - deterministic closeout head
  - proof hash and exact artifact hashes from landed bytes
  - ordinary entity resolution
validator_modes:
  normal: "requires --repo-root for canonical receipt/output bytes and repository-backed landing proof verification; --landing-proof-repo-root may explicitly name a separate authoritative Git worktree and otherwise defaults to --repo-root; squash additionally requires provider-ordered --source-commits so source patch IDs and aggregate digest are Git-rederived"
  allow_any_path: "fixture-only structural mode; skips canonical path and Git proof but not schema, payload, phase, or requested byte checks"
  verify_sources: "hash <repo-root>/<workflow>/<entity_slug>/{index,review,ship}.md against ownership_proof.source_hashes before merge"
  verify_outputs: "resolve safe repo-relative output paths, hash landed files, then parse exactly one Markdown table row inside the bounded Shipped section whose cells[0] equals roadmap_row.identity and hash the exact original selected line bytes excluding its line terminator"
  path_safety: "reject absolute paths, traversal, missing files, resolved paths outside repo root, and every symlink component including aliases that still resolve inside the repo"
