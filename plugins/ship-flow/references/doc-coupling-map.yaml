# doc-coupling-map.yaml — see references/doc-sync-context.md §Source Map for
# the exhaustive release-time map; this is the tight per-PR mechanical subset
# consumed by bin/doc-impact-gate.sh (AC-2).
#
# Resolution order: .claude/ship-flow/doc-coupling.yaml (adopter override,
# absent by default) else this file.
#
# Tightness is a design constraint, not a suggestion (design.md D1
# pre-mortem guard): keep this set small and reviewed where staleness has
# actually bitten and is NOT already gated elsewhere (e.g. version claims —
# scripts/check-version-triple.sh already gates those; do not duplicate).
#
# checker-source-map.exemptGlobs (issue #46): merged-pr-closeout-reconciler.sh
# was renamed to closeout-adapter.sh; the retired path is exempt from the
# protected-path delete gate. See the closeout-adapter Source-Map row in
# doc-sync-context.md for the live coupling.
schema_version: "1.1"
couplings:
  - name: stage-skill-readme
    srcGlobs: ["plugins/ship-flow/skills/ship-*/SKILL.md"]
    docPaths: ["plugins/ship-flow/README.md"]
    rationale: "Stage skill behavior changes drift from README pipeline/stage-flow prose (PR #6 precedent)."
  - name: reference-schema-readme
    srcGlobs: ["plugins/ship-flow/references/*.yaml"]
    docPaths: ["plugins/ship-flow/README.md"]
    rationale: "Schema/reference YAML changes must stay reflected in README schema summaries."
  - name: checker-source-map
    srcGlobs: ["plugins/ship-flow/bin/*.sh"]
    docPaths: ["plugins/ship-flow/references/doc-sync-context.md"]
    exemptGlobs: ["plugins/ship-flow/bin/merged-pr-closeout-reconciler.sh"]
    rationale: "New/changed shell checkers must register a Source-Map row per doc-sync-context.md's own coverage contract. exemptGlobs: merged-pr-closeout-reconciler.sh was renamed to closeout-adapter.sh (issue #46); the retired path is exempt from the protected-path delete gate."
  - name: contribution-contract
    srcGlobs: [".github/workflows/ship-flow-invariants.yml", ".github/workflows/ship-flow-doc-impact.yml", "plugins/ship-flow/bin/doc-impact-gate.sh", "plugins/ship-flow/references/doc-coupling-map.yaml", "plugins/ship-flow/references/ship-flow-doc-impact-workflow.yml", "plugins/ship-flow/lib/__tests__/test-adopter-doc-impact-ci.sh", "plugins/ship-flow/lib/__tests__/test-doc-impact-gate.sh", "plugins/ship-flow/lib/__tests__/test-contribution-contract.sh", "plugins/ship-flow/skills/ship-onboard/SKILL.md"]
    docPaths: ["plugins/ship-flow/CONTRIBUTING.md", "plugins/ship-flow/_mods/contribution-contract.md"]
    directions: ["source-to-doc", "doc-to-source"]
    rationale: "The generic coupling mechanism and its contributor/FO contracts must evolve as one bidirectional surface."
  - name: issue-anchor-guard
    srcGlobs: ["plugins/ship-flow/_mods/issue-anchor-guard.md"]
    docPaths: ["plugins/ship-flow/skills/ship-shape/SKILL.md"]
    directions: ["source-to-doc", "doc-to-source"]
    rationale: "The mod's Hook/resolver contract and the ship-shape pinned Pre-Intake wiring must evolve as one bidirectional surface — a guard change without re-wiring the SKILL section (or vice versa) would silently reintroduce the drift the guard exists to catch."
