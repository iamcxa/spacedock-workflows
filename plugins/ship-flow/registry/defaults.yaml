# registry/defaults.yaml — Plugin-default domain registry for ship-flow
#
# PURPOSE: Maps domain names to specialist designers, knowledge modules, and
# optional downstream skill routing hints.
# Consumed by: ship-design router (113.1), schema-designer specialist (113.3),
#              intent-match-verifier (113.4) via lib/registry-resolve.sh.
#
# ADOPTER OVERRIDE: Place project-level overrides at:
#   .claude/ship-flow/domains.yaml
# Precedence: project .claude/ship-flow/domains.yaml > this file (full-replace per domain)
#
# M1-M5 DEGRADATION PATHS (emitted by registry-resolve.sh):
#   M1 specialist_missing  — domain matched, designer_section_anchor empty → exit 10
#   M2 knowledge_module_missing — knowledge_module file absent on disk → exit 11
#   M3 partial_coverage    — multi-domain spec, some matched / some missing → exit 0
#   M4 parse_error         — this file malformed → exit 20 (fail loud)
#   M5 invalid_trigger_config — domain has both trigger_patterns: [] AND spec_keywords: [] → exit 21
#
# PORTABILITY (A3/A4): This file contains ONLY generic patterns.
# NO adopter-specific globs or project-level skill names — adopters supply
# trigger_patterns, required_skills, and skill_hints via .claude/ship-flow/domains.yaml.
# Examples of adopter-specific patterns that belong in project override, NOT here:
#   project globs like fmodel patterns, migration path globs, or team-specific keywords.
#
# VERSIONING: v1 seeded schema first. Portable non-UI contract/interface
# domains route to the built-in contract-interface design lane.

schema_version: "1.0"
domains:
  schema:
    trigger_patterns: []
    spec_keywords:
      - schema
      - drizzle
      - fmodel
      - migration
      - column
      - "L1 decider"
      - "L2 fstore"
      - "L3 view"
    knowledge_module: plugins/ship-flow/references/domain-knowledge/schema.md
    # First plugin-default specialist, shipped by 113.3. Adopters can full-replace
    # this domain entry to point at a project-specific schema designer anchor.
    designer_section_anchor: "ship-design#schema-designer"
    description: "Schema design — drizzle tables, fmodel L1/L2/L3, indexes, FK, migration sequencing"

  agent-contract:
    trigger_patterns: []
    spec_keywords:
      - "agent contract"
      - "worker contract"
      - "role definition"
      - "dispatch agent"
      - "ensign contract"
    designer_section_anchor: "ship-design#contract-interface-designer"
    description: "Agent/worker contract design — role definitions, dispatch contract, worker protocol boundaries"

  api-vocabulary:
    trigger_patterns: []
    spec_keywords:
      - "API vocabulary"
      - "api vocabulary"
      - "endpoint vocabulary"
      - "request vocabulary"
      - "response vocabulary"
      - "resource naming"
    designer_section_anchor: "ship-design#contract-interface-designer"
    description: "API vocabulary design — endpoint/resource naming, request/response terminology, contract words"

  selector-grammar:
    trigger_patterns: []
    spec_keywords:
      - "selector grammar"
      - "role selector"
      - "name selector"
      - "locator grammar"
      - "lookup selector"
    designer_section_anchor: "ship-design#contract-interface-designer"
    description: "Selector grammar design — selector syntax, role/name lookup grammar, locator semantics"

  tool-protocol:
    trigger_patterns: []
    spec_keywords:
      - "tool protocol"
      - "tool call protocol"
      - "tool invocation"
      - "MCP tool"
      - "protocol envelope"
    designer_section_anchor: "ship-design#contract-interface-designer"
    description: "Tool protocol design — tool call shapes, invocation envelopes, protocol semantics"

  dsl:
    trigger_patterns: []
    spec_keywords:
      - "DSL"
      - "domain specific language"
      - "query language"
      - "command language"
      - "syntax grammar"
    designer_section_anchor: "ship-design#contract-interface-designer"
    description: "DSL design — command/query language syntax and semantic boundaries"

  message-format:
    trigger_patterns: []
    spec_keywords:
      - "message format"
      - "payload format"
      - "response format"
      - "request envelope"
      - "wire message"
    designer_section_anchor: "ship-design#contract-interface-designer"
    description: "Message format design — payload/envelope/message shape before implementation"
