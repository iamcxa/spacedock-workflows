## Ship-Flow Pipeline Template
## Discovered by spacedock:workflow-adopt to bootstrap via commission.

name: ship-flow
description: "Ship-focused pipeline. SHAPE once with captain, then agents run design for UI/domain/contract-bearing work before plan → execute → verify → ship."
plugin: ship-flow
id-style: slug

entity:
  type: feature
  label: feature
  label_plural: features
  description: "a feature, bugfix, or improvement to ship"

defaults:
  worktree: true
  concurrency: 2

stages:
  - name: draft
    initial: true
    worktree: false
    manual: true
    description: "Captain captures idea. Advance to shape when ready."

  - name: shape
    worktree: false
    gate: true
    manual: true
    skill: ship-flow:ship-shape
    model: opus
    description: "Captain-facing. FO invokes skill directly (not via ensign) for interactive Musk audit. Reads PRODUCT.md + ROADMAP.md, size triage (S/M/L), scoring gate. Only human gate in the pipeline."

  - name: design
    worktree: true
    gate: true
    manual: conditional
    skip-when: "!affects_ui && !domain && !design_required"
    skill: ship-flow:ship-design
    model: opus
    description: "Design is mandatory for UI, matched-domain, or contract-bearing work. Skips only for trivial mechanical work with no affects_ui, no matched domain, and no design_required signal."

  - name: plan
    skill: ship-flow:ship-plan
    model: sonnet
    description: "Agent-autonomous. Size-adaptive research + plan writing + self-review loop. Max 3 iterations."

  - name: execute
    skill: ship-flow:ship-execute
    model: sonnet
    description: "Agent-autonomous. Wave-parallel dispatch with per-task model hints, implementer→reviewer loop, BLOCKED escalation ladder."

  - name: verify
    gate: true
    worktree: false
    skill: ship-flow:ship-verify
    model: sonnet
    dispatch: debate-driven
    feedback-to: "execute|design|plan|follow-up"
    description: "Agent gate. FO dispatches review agents, integrates findings, runs quality gate + UAT. Verify-stage captain UAT feedback routes to execute/design/plan/follow-up by finding class; FO does not inline-fix BLOCKING/WARNING findings."

  - name: ship
    worktree: false
    skill: ship-flow:ship-review
    model: sonnet
    description: "Agent-autonomous. PR creation, ROADMAP.md + PRODUCT.md updates, token cost summary. Advances to done."

  - name: done
    terminal: true
    worktree: false
    description: "Terminal stage. Merge hook fires here. Entity archived after merge."

gates:
  - shape
  - verify

location_default: "docs/ship-flow/"
