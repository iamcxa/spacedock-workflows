## Ship-Flow Pipeline Template
## Adoption note (0.7.0): bootstrapping this template into a project is NOT self-contained in 0.7.0.
## The intended bridge is `spacebridge:workflow-adopt`, which discovers this file and delegates
## to `spacedock:commission` to scaffold `docs/<wf>/`. That requires the `spacebridge` plugin.
## Without spacebridge: scaffold `docs/<wf>/` manually from this template, or use
## `/spacedock:commission` with ship-flow directly. Self-contained adoption is a planned later milestone.

name: ship-flow
description: "Ship-focused pipeline. SHAPE once with captain, then agents run design for UI/domain/contract-bearing work before plan → execute → verify → ship."
plugin: ship-flow
id-style: slug

entity:
  type: feature
  label: feature
  label_plural: features
  description: "a feature, bugfix, or improvement to ship"

defaults:
  worktree: true
  concurrency: 2

stages:
  - name: draft
    initial: true
    worktree: false
    manual: true
    description: "Captain captures idea. Advance to shape when ready."

  - name: shape
    worktree: false
    gate: true
    manual: true
    parallelism: probes
    skill: ship-flow:ship-shape
    model: opus
    description: "Captain-facing. FO invokes skill directly (not via ensign) for interactive Musk audit. Reads PRODUCT.md + ROADMAP.md + ARCHITECTURE.md, size triage (S/M/L), scoring gate, and canonical update intent. Only human gate in the pipeline."

  - name: design
    worktree: true
    gate: true
    manual: conditional
    parallelism: lanes
    skill: ship-flow:ship-design
    model: opus
    description: "Design always runs (W3 — pitch 116). UI work, matched-domain work, schema/API/domain/architecture contract impact, and unresolved contract/interface decision work all dispatch designer. Pure mechanical work walks Phase 0 trivial-pass fast-path emitting minimal design.md + verdict PROCEED."

  - name: plan
    parallelism: draft-lanes
    skill: ship-flow:ship-plan
    model: sonnet
    description: "Agent-autonomous. Size-adaptive research + plan writing + self-review loop. Max 3 iterations."

  - name: execute
    parallelism: dag
    skill: ship-flow:ship-execute
    model: sonnet
    description: "Agent-autonomous. Wave-parallel dispatch with per-task model hints, implementer→reviewer loop, BLOCKED escalation ladder."

  - name: verify
    gate: true
    worktree: false
    parallelism: checks
    skill: ship-flow:ship-verify
    model: sonnet
    dispatch: debate-driven
    feedback-to: "execute"
    description: "Agent gate. FO dispatches review agents, integrates findings, runs quality gate + UAT. Stage feedback returns to execute; any multi-destination routing by finding class is handled inside verify.md via route_to:. FO does not inline-fix BLOCKING/WARNING findings."

  - name: ship
    worktree: false
    skill: ship-flow:ship-review
    model: sonnet
    description: "Agent-autonomous. PR creation, ROADMAP.md + PRODUCT.md + ARCHITECTURE.md updates, token cost summary. Advances to done."

  - name: done
    terminal: true
    worktree: false
    description: "Terminal stage. Merge hook fires here. Entity archived after merge."

gates:
  - shape
  - verify

location_default: "docs/ship-flow/"
